<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality | Brutalist Matrix</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Background "Pollution Fog" layer -->
    <div class="fog-overlay" id="fog-overlay"></div>

    <div class="cyber-frame">
        
        <!-- VERTICAL NAV LEFT -->
        <nav class="vertical-nav">
            <div class="brand"></div>
            <div class="city-selector">
                <button class="city-btn active" data-city="delhi">DELHI</button>
                <button class="city-btn" data-city="hyd">HYDERABAD</button>
                <button class="city-btn" data-city="chen">CHENNAI</button>
            </div>
            <button class="admin-open" id="open-admin-btn" title="Configuration">[CONFIG]</button>
        </nav>

        <!-- CENTER CANVAS (Massive Typographic Focal Point) -->
        <section class="master-canvas">
            <div class="typography-layer">
                <div class="pm-massive" id="pm-massive">000</div>
                <div class="label-overlay">PM2.5 / PREDICTED</div>
            </div>
            
            <header class="canvas-header">
                <h1 id="city-title">DELHI</h1>
                <div class="view-switch">
                    <button class="view-btn active" data-view="general">PUBLIC</button>
                    <button class="view-btn" data-view="authorities">EXEC</button>
                </div>
            </header>
        </section>

        <!-- RIGHT DATA PANEL (Frameless Editorial Lists) -->
        <aside class="data-panel">
            <div class="panel-section">
                <h3 class="panel-title">IMPACT VECTORS</h3>
                <div class="line-divider"></div>
                <ul class="editorial-list block-list" id="personas-list">
                    <!-- Populated by JS -->
                </ul>
            </div>

            <div class="panel-section alerts-container" id="alerts-container">
                <h3 class="panel-title" id="alerts-title">SYSTEM ALERTS</h3>
                <div class="line-divider"></div>
                <ul class="editorial-list" id="alerts-list">
                     <!-- Populated by JS -->
                </ul>
            </div>
        </aside>

    </div>

    <!-- Minimalist Configuration Modal -->
    <div class="cyber-modal" id="admin-modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>ADMIN</h2>
                <button class="close-btn" id="close-admin-btn">×</button>
            </header>
            
            <div class="input-matrix">
                <div class="input-line">
                    <label>DELHI</label>
                    <input type="number" id="input-delhi" placeholder="000">
                </div>
                <div class="input-line">
                    <label>HYDERABAD</label>
                    <input type="number" id="input-hyd" placeholder="000">
                </div>
                <div class="input-line">
                    <label>CHENNAI</label>
                    <input type="number" id="input-chen" placeholder="000">
                </div>
            </div>

            <button id="save-data-btn" class="cyber-btn">COMMIT // OVERRIDE</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
